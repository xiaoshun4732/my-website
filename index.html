  <script>
    // ===== 弹窗元素获取 =====
    const wechatModal = document.getElementById('wechatModal');
    const successModal = document.getElementById('successModal');
    const openBtn = document.getElementById('ct_qposlwc7');
    const openBtn2 = document.getElementById('ct_lem6et8s');
    const closeWechatBtn = document.getElementById('closeWechatModal');
    const closeSuccessBtn = document.getElementById('closeSuccessModal');
    const confirmSuccessBtn = document.getElementById('confirmSuccessBtn');
    const copyBtn = document.getElementById('copyWechatBtn');
    const wechatId = '643tqpny';

    // ===== 通用关闭弹窗函数 =====
    function closeModal(modal) {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    // ===== 打开微信主弹窗 =====
    openBtn.addEventListener('click', () => {
      wechatModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });
    openBtn2.addEventListener('click', () => {
      wechatModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    // ===== 关闭微信主弹窗 =====
    closeWechatBtn.addEventListener('click', () => closeModal(wechatModal));
    wechatModal.addEventListener('click', (e) => {
      if (e.target === wechatModal) closeModal(wechatModal);
    });

    // ===== 关闭复制成功弹窗 =====
    function closeSuccess() {
      closeModal(successModal);
      // 同时关闭微信主弹窗
      closeModal(wechatModal);
    }
    closeSuccessBtn.addEventListener('click', closeSuccess);
    confirmSuccessBtn.addEventListener('click', closeSuccess);
    successModal.addEventListener('click', (e) => {
      if (e.target === successModal) closeSuccess();
    });

    // ===== 复制微信号功能（弹出成功弹窗） =====
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(wechatId);
      } catch (err) {
        // 兼容低版本浏览器
        const textarea = document.createElement('textarea');
        textarea.value = wechatId;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      }
      // 复制成功后，关闭主弹窗，打开成功弹窗
      closeModal(wechatModal);
      successModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    // 兼容原页面的LINE复制按钮（保留原有功能）
    document.querySelectorAll('[data-module-type="copytext"] button').forEach(btn => {
      btn.addEventListener('click', function() {
        const text = decodeURIComponent(this.dataset.ct);
        navigator.clipboard.writeText(text).then(() => {
          const originalText = this.textContent;
          this.textContent = this.dataset.ok;
          setTimeout(() => {
            this.textContent = originalText;
          }, 2000);
        });
      });
    });
  </script>
